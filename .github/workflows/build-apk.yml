name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Decode Keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/release.keystore

      # Fix: pipe all answers — n for JDK, then JAVA_HOME path
      - name: Init TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          printf "n\n$JAVA_HOME\n" | bubblewrap init --manifest ../twa-manifest.json

      - name: Build APK
        working-directory: twa-build
        run: |
          printf "n\n$JAVA_HOME\n" | bubblewrap build \
            --signingKeyPath  ../keystore/release.keystore \
            --signingKeyAlias erp-key \
            --ksPass          "${{ secrets.KEYSTORE_PASS }}" \
            --keyPass         "${{ secrets.KEYSTORE_PASS }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ERP-Dashboard-APK
          path: |
            twa-build/app-release-signed.apk
            twa-build/app-release.apk
          if-no-files-found: warn
          retention-days: 30
